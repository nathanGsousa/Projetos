function rRadar(){

    paper_bgcolor:"rgba(0,0,0,0)",
    font:{family:"DM Sans",color:"#94a3b8",size:11},
    margin:{l:80,r:80,t:55,b:50},
    title:{text:uf+": Evolucao do Perfil Setorial",font:{size:13,color:"#e0e4ec"}},
    legend:{font:{size:10},x:0.35,y:-0.1,orientation:"h"},
    height:420
  },CF);

  // Bar chart showing delta per sector
  var deltas=[];
  for(var j=0;j<R.secoes.length;j++){
    deltas.push({secao:R.secoes[j],nome:fullNames[j],delta:parseFloat((d.p2[j]-d.p1[j]).toFixed(1)),p1:d.p1[j],p2:d.p2[j]});
  }
  deltas.sort(function(a,b){return b.delta-a.delta});
  Plotly.newPlot("RDS2",[{
    y:deltas.map(function(x){return x.secao+" - "+x.nome.slice(0,25)}),
    x:deltas.map(function(x){return x.delta}),
    type:"bar",orientation:"h",
    marker:{color:deltas.map(function(x){return x.delta>=0?"rgba(16,185,129,.7)":"rgba(239,68,68,.7)"})},
    text:deltas.map(function(x){return(x.delta>=0?"+":"")+x.delta+" p.p."}),
    textposition:"outside",textfont:{size:9,color:"#94a3b8"},
    hovertemplate:"%{y}<br>P1: %{customdata[0]:.1f}%<br>P2: %{customdata[1]:.1f}%<br>Delta: %{x:+.1f} p.p.<extra></extra>",
    customdata:deltas.map(function(x){return[x.p1,x.p2]})
  }],{
    paper_bgcolor:"rgba(0,0,0,0)",plot_bgcolor:"rgba(0,0,0,0)",
    font:{family:"DM Sans",color:"#94a3b8",size:10},
    margin:{l:200,r:60,t:55,b:40},
    xaxis:{gridcolor:"rgba(16,185,129,.06)",zeroline:true,zerolinecolor:"rgba(16,185,129,.2)",title:"Variacao Market Share (p.p.)"},
    yaxis:{gridcolor:"rgba(16,185,129,.06)"},
    title:{text:uf+": Variacao do Market Share por Setor (P1→P2)",font:{size:13,color:"#e0e4ec"}},
    height:420
  },CF);
}


render();
</script>
